<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="thunder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24">
        <animate attributeName="stop-color" values="#fbbf24;#f59e0b;#fbbf24" dur="0.5s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#f59e0b">
        <animate attributeName="stop-color" values="#f59e0b;#fbbf24;#f59e0b" dur="0.5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#d97706">
        <animate attributeName="stop-color" values="#d97706;#f59e0b;#d97706" dur="0.5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    <filter id="electric">
      <feTurbulence baseFrequency="0.1" numOctaves="3" seed="5"/>
      <feColorMatrix in="turbulence" mode="luminanceToAlpha"/>
      <feComposite in="SourceGraphic" operator="in"/>
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    
    <filter id="spark">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- ইলেকট্রিক ফিল্ড -->
  <path d="M12 2L8 8h4l-2 6 6-8h-4l2-4z" fill="url(#thunder)" opacity="0.2" filter="url(#electric)">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="0.3s" repeatCount="indefinite" />
  </path>
  
  <!-- মাইক্রোফোন -->
  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 1 0 6 0V5a3 3 0 0 0-3-3z" stroke="url(#thunder)" stroke-width="2" filter="url(#spark)">
    <animate attributeName="stroke-width" values="2;2.5;2" dur="0.2s" repeatCount="indefinite" />
  </path>
  <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="url(#thunder)" stroke-width="2" filter="url(#spark)"/>
  
  <!-- স্পার্ক ইফেক্ট -->
  <circle cx="8" cy="6" r="0.8" fill="#fbbf24" filter="url(#spark)">
    <animate attributeName="cx" values="8;9;7;8" dur="0.3s" repeatCount="indefinite" />
    <animate attributeName="cy" values="6;5;7;6" dur="0.3s" repeatCount="indefinite" />
    <animate attributeName="r" values="0.8;1.2;0.6;0.8" dur="0.3s" repeatCount="indefinite" />
  </circle>
  <circle cx="16" cy="15" r="0.6" fill="#f59e0b" filter="url(#spark)">
    <animate attributeName="cx" values="16;17;15;16" dur="0.4s" repeatCount="indefinite" />
    <animate attributeName="cy" values="15;14;16;15" dur="0.4s" repeatCount="indefinite" />
  </circle>
  
  <line x1="12" y1="19" x2="12" y2="22" stroke="url(#thunder)" stroke-width="3" stroke-linecap="round" filter="url(#spark)">
    <animate attributeName="stroke-width" values="3;4;3" dur="0.1s" repeatCount="indefinite" />
  </line>
  
  <circle cx="12" cy="23" r="1.5" fill="url(#thunder)" filter="url(#spark)">
    <animate attributeName="r" values="1.5;2;1.2;1.5" dur="0.2s" repeatCount="indefinite" />
  </circle>
</svg>
