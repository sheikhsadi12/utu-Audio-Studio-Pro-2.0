<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="url(#galaxy)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <radialGradient id="galaxy" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="1">
        <animate attributeName="stop-color" values="#c084fc;#f472b6;#c084fc" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.9">
        <animate attributeName="stop-color" values="#8b5cf6;#6366f1;#8b5cf6" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8"/>
    </radialGradient>
    
    <filter id="star-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="nebula">
      <feTurbulence baseFrequency="0.01" numOctaves="3" seed="3"/>
      <feColorMatrix in="turbulence" mode="saturate" values="5"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  
  <!-- নেবুলা ব্যাকগ্রাউন্ড -->
  <circle cx="12" cy="12" r="14" fill="url(#galaxy)" opacity="0.3" filter="url(#nebula)"/>
  
  <!-- স্টার পার্টিকেলস -->
  <circle cx="6" cy="5" r="0.3" fill="#ffffff" filter="url(#star-glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="18" cy="8" r="0.4" fill="#fbbf24" filter="url(#star-glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="20" cy="18" r="0.3" fill="#ffffff" filter="url(#star-glow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="4" cy="20" r="0.4" fill="#c084fc" filter="url(#star-glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite" />
  </circle>
  
  <!-- মাইক্রোফোন -->
  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 1 0 6 0V5a3 3 0 0 0-3-3z" stroke="url(#galaxy)" stroke-width="1.8" filter="url(#star-glow)"/>
  <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="url(#galaxy)" stroke-width="1.8" filter="url(#star-glow)"/>
  
  <!-- তারার ঝলকানি -->
  <circle cx="12" cy="22" r="2" fill="none" stroke="url(#galaxy)" stroke-width="1.5" stroke-dasharray="3 3">
    <animate attributeName="r" values="2;2.5;2" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <line x1="12" y1="19" x2="12" y2="21" stroke="url(#galaxy)" stroke-width="2" stroke-dasharray="2 2" filter="url(#star-glow)"/>
</svg>
