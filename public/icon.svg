<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#a8e6cf" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4edfa" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shine">
      <feDiffuseLighting in="SourceGraphic" surfaceScale="2" diffuseConstant="2">
        <feDistantLight azimuth="225" elevation="30"/>
      </feDiffuseLighting>
    </filter>
    <clipPath id="crystal">
      <polygon points="12,2 18,5 18,11 12,14 6,11 6,5"/>
    </clipPath>
  </defs>
  
  <!-- ক্রিস্টাল বেস -->
  <polygon points="12,2 18,5 18,11 12,14 6,11 6,5" fill="url(#diamond)" stroke="url(#diamond)" stroke-width="1.5" filter="url(#shine)"/>
  
  <!-- মাইক্রোফোন ডিটেল -->
  <circle cx="12" cy="8" r="2" fill="none" stroke="white" stroke-width="1"/>
  <path d="M12 10v4" stroke="white" stroke-width="1.5"/>
  
  <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="white" stroke-width="1.2" opacity="0.8"/>
  
  <!-- ডায়মন্ড স্ট্যান্ড -->
  <path d="M10 22h4" stroke="white" stroke-width="2"/>
  <path d="M12 19v3" stroke="white" stroke-width="2"/>
</svg>
