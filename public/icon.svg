<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#7b2cbf" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="plasma" x1="0%" y1="0%" x2="100%" y2="0%" gradientTransform="rotate(45)">
      <stop offset="0%" stop-color="#9d4edd">
        <animate attributeName="stop-color" values="#9d4edd;#c77dff;#9d4edd" dur="2s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#5a189a">
        <animate attributeName="stop-color" values="#5a189a;#7b2cbf;#5a189a" dur="2s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#3c096c">
        <animate attributeName="stop-color" values="#3c096c;#9d4edd;#3c096c" dur="2s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="plasma-flow">
      <feTurbulence baseFrequency="0.03" numOctaves="3" seed="2"/>
      <feColorMatrix in="turbulence" mode="saturate" values="2"/>
    </filter>
  </defs>
  
  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 1 0 6 0V5a3 3 0 0 0-3-3z" stroke="url(#plasma)" stroke-width="2" filter="url(#plasma-flow)"/>
  <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="url(#plasma)" stroke-width="2" filter="url(#plasma-flow)"/>
  
  <!-- প্লাজমা বল -->
  <circle cx="12" cy="22" r="2.5" fill="none" stroke="url(#plasma)" stroke-width="1.5">
    <animate attributeName="r" values="2.5;3;2.5" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
