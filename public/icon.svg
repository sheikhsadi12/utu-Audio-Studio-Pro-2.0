<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="url(#ice)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="ice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc" stop-opacity="0.9">
        <animate attributeName="stop-color" values="#a5f3fc;#7dd3fc;#a5f3fc" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#7dd3fc" stop-opacity="0.8">
        <animate attributeName="stop-color" values="#7dd3fc;#38bdf8;#7dd3fc" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.9">
        <animate attributeName="stop-color" values="#38bdf8;#0ea5e9;#38bdf8" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    <filter id="frost">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="3" specularConstant="0.8" specularExponent="15" lighting-color="#a5f3fc">
        <fePointLight x="-2000" y="-2000" z="5000"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
    
    <filter id="ice-crystal">
      <feTurbulence baseFrequency="0.1" numOctaves="2" seed="7"/>
      <feColorMatrix in="turbulence" mode="saturate" values="0.5"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  
  <!-- বরফের ক্রিস্টাল -->
  <polygon points="12,2 14,5 12,8 10,5" fill="none" stroke="url(#ice)" stroke-width="0.8" opacity="0.6" filter="url(#ice-crystal)"/>
  <polygon points="16,8 18,11 16,14 14,11" fill="none" stroke="url(#ice)" stroke-width="0.8" opacity="0.6" filter="url(#ice-crystal)"/>
  <polygon points="8,8 10,11 8,14 6,11" fill="none" stroke="url(#ice)" stroke-width="0.8" opacity="0.6" filter="url(#ice-crystal)"/>
  
  <!-- মাইক্রোফোন -->
  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 1 0 6 0V5a3 3 0 0 0-3-3z" stroke="url(#ice)" stroke-width="2" filter="url(#frost)"/>
  <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="url(#ice)" stroke-width="2" filter="url(#frost)"/>
  
  <!-- তুষারকণা -->
  <circle cx="5" cy="15" r="0.6" fill="white" filter="url(#frost)" opacity="0.7">
    <animate attributeName="r" values="0.6;0.8;0.6" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="19" cy="5" r="0.5" fill="white" filter="url(#frost)" opacity="0.7">
    <animate attributeName="r" values="0.5;0.7;0.5" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <line x1="12" y1="19" x2="12" y2="22" stroke="url(#ice)" stroke-width="2.5" filter="url(#frost)"/>
  <circle cx="12" cy="23" r="1.8" fill="none" stroke="url(#ice)" stroke-width="1.5" stroke-dasharray="3 3" filter="url(#frost)">
    <animate attributeName="r" values="1.8;2.2;1.8" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
