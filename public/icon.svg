<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff9d" stop-opacity="1">
        <animate attributeName="stop-color" values="#00ff9d;#00b8ff;#00ff9d" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00b8ff" stop-opacity="1">
        <animate attributeName="stop-color" values="#00b8ff;#ff00e6;#00b8ff" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="hologram">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1" specularExponent="20" lighting-color="#ffffff" result="specOut">
        <fePointLight x="-5000" y="-10000" z="10000"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>
  
  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 1 0 6 0V5a3 3 0 0 0-3-3z" filter="url(#hologram)"/>
  <path d="M19 10v2a7 7 0 0 1-14 0v-2" filter="url(#hologram)"/>
  
  <!-- সাউন্ড ওয়েভ ক্রিস্টাল ইফেক্ট -->
  <path d="M8 12l2-2 2 2 2-2 2 2" stroke="url(#gradient)" stroke-width="0.8" fill="none" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
  </path>
  
  <circle cx="12" cy="22" r="1.5" fill="url(#gradient)" stroke="none">
    <animate attributeName="r" values="1.5;2;1.5" dur="1.5s" repeatCount="indefinite" />
  </circle>
</svg>
