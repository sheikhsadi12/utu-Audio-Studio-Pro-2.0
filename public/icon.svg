<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ff00c1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="cyber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00c1"/>
      <stop offset="50%" stop-color="#9600ff"/>
      <stop offset="100%" stop-color="#00f7ff"/>
    </linearGradient>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" patternUnits="userSpaceOnUse" width="4" height="4">
      <path d="M 4 0 L 0 0 0 4" fill="none" stroke="#ff00c1" stroke-width="0.2" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- সাইবার গ্রিড ব্যাকগ্রাউন্ড -->
  <rect width="24" height="24" fill="url(#grid)"/>
  
  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 1 0 6 0V5a3 3 0 0 0-3-3z" stroke="url(#cyber)" stroke-width="2" filter="url(#neon-glow)"/>
  <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="url(#cyber)" stroke-width="2" filter="url(#neon-glow)"/>
  
  <!-- গ্লিচ ইফেক্ট -->
  <path d="M12 19v3" stroke="#ff00c1" stroke-width="3" filter="url(#neon-glow)">
    <animate attributeName="d" values="M12 19v3;M11 19v4;M12 19v3" dur="0.2s" repeatCount="indefinite" />
  </path>
  
  <!-- নিওন ডটস -->
  <circle cx="12" cy="22" r="1.2" fill="#00f7ff" stroke="none" filter="url(#neon-glow)">
    <animate attributeName="r" values="1.2;1.8;1.2" dur="1s" repeatCount="indefinite" />
  </circle>
</svg>
